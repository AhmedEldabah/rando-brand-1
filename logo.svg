<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Noir Fine Coffee">
  <!-- Thin square border -->
  <rect x="14" y="14" width="92" height="92" fill="none" stroke="#a89070" stroke-width="0.7" opacity="0.6"/>
  <!-- Inner thin border -->
  <rect x="20" y="20" width="80" height="80" fill="none" stroke="#a89070" stroke-width="0.4" opacity="0.3"/>

  <!-- Geometric N lettermark, clean and minimal -->
  <path d="M42,75 L42,45 L78,75 L78,45" fill="none" stroke="#a89070" stroke-width="2.2" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Thin rule -->
  <line x1="30" y1="87" x2="90" y2="87" stroke="#a89070" stroke-width="0.6" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="60" y="101"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="11" fill="#f0ece6" font-weight="bold" letter-spacing="6">NOIR</text>

  <!-- Sub-text -->
  <text x="60" y="111"
        text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="5.5" fill="#a89070" letter-spacing="3" font-weight="400">FINE COFFEE</text>
</svg>
