<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — NOIR</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>(function(){var t=localStorage.getItem('noir_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#08080c; --bg2:#0e0e18; --bg3:#181828;
      --gold:#FFB300; --gold-lt:#FFD740; --cream:#FFFFFF;
      --text:#EDE8FF; --muted:#9590A8; --purple:#7C4DFF;
      --electric:#00E5FF; --hot:#FF4081; --neon:#E040FB;
      --nav-h:72px; --r:12px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; cursor: none; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg,var(--gold),var(--hot)); border-radius: 3px; }
    .serif { font-family: 'Playfair Display', serif; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; font-weight: 900; }
    p { line-height: 1.7; color: var(--muted); }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .btn-primary { display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--gold),var(--hot));color:#fff;font-weight:600;padding:14px 32px;border-radius:50px;text-decoration:none;border:none;cursor:pointer;font-size:.95rem;transition:opacity .25s,transform .2s,box-shadow .25s;box-shadow:0 4px 20px rgba(255,179,0,.35); }
    .btn-primary:hover { opacity:.88;transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,64,129,.5); }
    .section-label { font-size:.78rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:block; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);} }
    @keyframes gradShift { 0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;} }
    .reveal { opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease; }
    .reveal.visible { opacity:1;transform:translateY(0); }
    .reveal-d1{transition-delay:.1s;}.reveal-d2{transition-delay:.2s;}.reveal-d3{transition-delay:.3s;}

    /* NAVBAR */
    nav { position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-h);display:flex;align-items:center;background:rgba(8,8,12,.85);backdrop-filter:blur(18px) saturate(1.6);border-bottom:1px solid rgba(255,179,0,.18); }
    nav .nav-inner { width:100%;max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between; }
    .nav-logo { font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;letter-spacing:.04em;text-decoration:none; }
    .nav-links { display:flex;align-items:center;gap:36px;list-style:none; }
    .nav-links a { color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:color .2s; }
    .nav-links a:hover,.nav-links a.active { color:var(--cream);text-shadow:0 0 16px rgba(255,179,0,.5); }
    .nav-cta { display:flex;gap:12px; }
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
    .hamburger span{display:block;width:24px;height:2px;background:var(--cream);border-radius:2px;transition:all .3s;}
    .mobile-menu{display:none;position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;background:rgba(8,8,12,.97);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:32px;}
    .mobile-menu.open{display:flex;}
    .mobile-menu a{font-family:'Playfair Display',serif;font-size:2rem;color:var(--cream);text-decoration:none;}
    @media(max-width:768px){.nav-links,.nav-cta{display:none;}.hamburger{display:flex;}}

    /* PAGE HERO */
    .page-hero {
      padding: calc(var(--nav-h) + 80px) 0 80px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,179,0,.08) 0%, rgba(124,77,255,.05) 40%, transparent 70%), var(--bg2);
      text-align: center; position: relative; overflow: hidden;
    }
    .page-hero::after { content:'MENU';position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-family:'Playfair Display',serif;font-size:clamp(5rem,18vw,14rem);font-weight:900;color:transparent;-webkit-text-stroke:1px rgba(255,179,0,.05);pointer-events:none;line-height:1; }
    .page-hero h1 { font-size:clamp(2.5rem,6vw,5rem);color:var(--cream);margin-bottom:12px;position:relative;z-index:1; }
    .page-hero p { max-width:500px;margin:0 auto;position:relative;z-index:1; }
    .prism-wrap { position:absolute;inset:0;pointer-events:none;z-index:0; }

    /* STICKY MENU NAV */
    .menu-nav {
      position: sticky; top: var(--nav-h); z-index: 100;
      background: rgba(8,8,12,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,179,0,.12);
      padding: 0 24px;
    }
    .menu-nav-inner { max-width:1200px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;padding: 12px 0;scrollbar-width:none; }
    .menu-nav-inner::-webkit-scrollbar{display:none;}
    .cat-btn { flex-shrink:0;padding:10px 22px;border-radius:50px;background:transparent;color:var(--muted);border:1px solid rgba(255,179,0,.2);font-family:'Inter',sans-serif;font-weight:500;font-size:.88rem;cursor:pointer;transition:all .2s; }
    .cat-btn.active,.cat-btn:hover { background:linear-gradient(135deg,var(--gold),var(--hot));color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(255,64,129,.4); }

    /* MENU SECTIONS */
    .menu-body { padding: 60px 0 100px; background: var(--bg); }
    .menu-section { margin-bottom: 80px; }
    .menu-section-head { display:flex;align-items:center;gap:16px;margin-bottom:32px; }
    .menu-section-head h2 { font-size:1.8rem;color:var(--cream); }
    .menu-section-head .line { flex:1;height:1px;background:linear-gradient(90deg,rgba(255,179,0,.3),transparent); }
    .items-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px; }

    /* ITEM CARD */
    .item-card {
      background:var(--bg3);border:1px solid rgba(255,179,0,.1);border-radius:var(--r);
      overflow:hidden;transition:transform .25s,border-color .25s,box-shadow .25s;
      display:flex;flex-direction:column;
    }
    .item-card:hover { transform:translateY(-6px);border-color:rgba(255,179,0,.4);box-shadow:0 16px 50px rgba(255,64,129,.2),0 0 0 1px rgba(255,179,0,.2); }
    .item-body { padding:20px;flex:1;display:flex;flex-direction:column; }
    .item-badges { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px; }
    .badge { font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:50px; }
    .badge-cat { background:rgba(255,179,0,.12);color:var(--gold-lt); }
    .badge-pop { background:rgba(255,64,129,.15);color:#FF80AB; }
    .badge-new { background:rgba(0,229,255,.12);color:#80DEEA; }
    .item-name { font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--cream);margin-bottom:6px; }
    .item-desc { font-size:.84rem;color:var(--muted);line-height:1.6;flex:1;margin-bottom:16px; }
    .item-footer { display:flex;align-items:center;justify-content:space-between; }
    .item-price { font-size:1.1rem;font-weight:700;color:var(--gold-lt); }
    .item-actions { display:flex;gap:8px;align-items:center; }
    .qty-btn { width:30px;height:30px;border-radius:50%;background:var(--bg2);color:var(--text);border:1px solid rgba(255,179,0,.2);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s; }
    .qty-btn:hover { background:linear-gradient(135deg,var(--gold),var(--hot));color:#fff;border-color:transparent; }
    .qty-display { font-weight:600;color:var(--cream);min-width:20px;text-align:center;font-size:.9rem; }
    .add-btn { padding:8px 18px;border-radius:50px;background:linear-gradient(135deg,var(--gold),var(--hot));color:#fff;border:none;font-weight:600;font-size:.84rem;cursor:pointer;transition:opacity .2s,transform .2s;box-shadow:0 4px 12px rgba(255,64,129,.3); }
    .add-btn:hover { opacity:.85;transform:scale(1.04); }

    /* FLOATING CART */
    .float-cart {
      position:fixed;bottom:32px;right:32px;z-index:500;
      background:linear-gradient(135deg,var(--gold),var(--hot));color:#fff;border:none;
      width:60px;height:60px;border-radius:50%;
      font-size:1.3rem;cursor:pointer;
      box-shadow:0 8px 28px rgba(255,64,129,.5);
      display:flex;align-items:center;justify-content:center;
      transition:transform .2s,box-shadow .2s;
    }
    .float-cart:hover { transform:scale(1.1);box-shadow:0 12px 36px rgba(255,64,129,.7); }
    .cart-badge { position:absolute;top:-4px;right:-4px;background:#fff;color:var(--hot);width:22px;height:22px;border-radius:50%;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center; }

    /* CART DRAWER */
    .cart-overlay { position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;opacity:0;pointer-events:none;transition:opacity .3s; }
    .cart-overlay.open { opacity:1;pointer-events:all; }
    .cart-drawer {
      position:fixed;right:0;top:0;bottom:0;width:min(420px,100vw);z-index:700;
      background:var(--bg2);border-left:1px solid rgba(255,179,0,.15);
      display:flex;flex-direction:column;
      transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
    }
    .cart-drawer.open { transform:translateX(0); }
    .drawer-head { padding:24px;border-bottom:1px solid rgba(255,179,0,.12);display:flex;align-items:center;justify-content:space-between; }
    .drawer-head h3 { font-family:'Playfair Display',serif;color:var(--cream);font-size:1.4rem; }
    .drawer-close { width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s; }
    .drawer-close:hover { background:var(--hot);color:#fff; }
    .drawer-body { flex:1;overflow-y:auto;padding:24px; }
    .cart-item { display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,179,0,.07); }
    .ci-emoji { width:44px;height:44px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0; }
    .ci-name { font-weight:500;color:var(--cream);font-size:.9rem; }
    .ci-price { font-size:.85rem;color:var(--gold-lt); }
    .ci-remove { margin-left:auto;width:28px;height:28px;border-radius:50%;background:transparent;border:1px solid rgba(255,179,0,.2);color:var(--muted);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0; }
    .ci-remove:hover { background:#c0392b;border-color:#c0392b;color:#fff; }
    .cart-empty { text-align:center;padding:60px 0;color:var(--muted); }
    .cart-empty i { font-size:3rem;margin-bottom:16px;display:block;opacity:.4; }
    .drawer-footer { padding:24px;border-top:1px solid rgba(255,179,0,.12); }
    .subtotal-row { display:flex;justify-content:space-between;margin-bottom:8px;font-size:.9rem; }
    .subtotal-row .label { color:var(--muted); }
    .subtotal-row .val { color:var(--cream);font-weight:600; }
    .total-row { display:flex;justify-content:space-between;margin:16px 0;font-size:1.1rem; }
    .total-row .label { color:var(--cream);font-weight:700; }
    .total-row .val { color:var(--gold-lt);font-weight:700; }
    .checkout-btn { width:100%;padding:16px;border-radius:50px;background:linear-gradient(135deg,var(--gold),var(--hot));color:#fff;font-weight:600;font-size:1rem;border:none;cursor:pointer;transition:opacity .2s,transform .2s;box-shadow:0 4px 16px rgba(255,64,129,.4); }
    .checkout-btn:hover { opacity:.88;transform:translateY(-2px); }
/* ── SCROLL PROGRESS ── */
.scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--hot),var(--purple));z-index:1002;width:0%;transition:width .1s linear;pointer-events:none;}
/* ── NAV LOGO ── */
.nav-logo{display:flex!important;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:28px;height:28px;flex-shrink:0;overflow:visible;}
.logo-wordmark{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;letter-spacing:.08em;background:linear-gradient(90deg,var(--gold),var(--hot));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
/* ── NAVBAR SCROLL ── */
nav{transition:background .3s,box-shadow .3s;}
nav.scrolled{background:rgba(8,8,12,.97)!important;box-shadow:0 4px 28px rgba(0,0,0,.5),0 1px 0 rgba(255,179,0,.15);}
/* ── HAMBURGER ANIMATION ── */
.hamburger span{transition:transform .3s ease,opacity .3s ease;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;transform:translateX(10px);}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
/* ── MOBILE MENU ── */
.mobile-menu{display:flex!important;transform:translateX(100%);visibility:hidden;transition:transform .38s cubic-bezier(.4,0,.2,1),visibility .38s;width:min(300px,85vw);left:auto;right:0;border-left:1px solid rgba(255,179,0,.15);background:rgba(8,8,12,.97);}
.mobile-menu.open{transform:translateX(0);visibility:visible;}
.mobile-overlay{position:fixed;inset:0;z-index:998;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .35s;}
.mobile-overlay.open{opacity:1;pointer-events:all;}
/* ── BUTTON RIPPLE ── */
.btn-primary,.btn-outline{position:relative;overflow:hidden;}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.22);transform:scale(0);animation:rippleAnim .65s linear;pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}
@media(max-width:768px){input,select,textarea{font-size:16px!important;}}
/* ── LIGHT MODE ── */
[data-theme="light"]{--bg:#F5F2ED;--bg2:#FDFAF5;--bg3:#EDE8DF;--text:#1c1820;--muted:#6b6480;--cream:#1c1820;}
[data-theme="light"] body{cursor:auto;}
[data-theme="light"] #cursorTrail{display:none;}
[data-theme="light"] nav{background:rgba(245,242,237,.92)!important;border-bottom-color:rgba(255,179,0,.3);}
[data-theme="light"] nav.scrolled{background:rgba(245,242,237,.98)!important;box-shadow:0 4px 20px rgba(0,0,0,.07);}
[data-theme="light"] .hamburger span{background:var(--text);}
[data-theme="light"] .mobile-menu{background:rgba(245,242,237,.98)!important;border-left-color:rgba(255,179,0,.25);}
[data-theme="light"] .mobile-menu a{color:var(--text)!important;}
[data-theme="light"] .mobile-overlay{background:rgba(180,170,160,.55);}
[data-theme="light"] .prism-wrap canvas{mix-blend-mode:multiply;opacity:.08;}
[data-theme="light"] .page-hero{background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,179,0,.1) 0%,rgba(124,77,255,.06) 40%,transparent 70%),var(--bg2);}
[data-theme="light"] .page-hero h1{color:var(--text);}
[data-theme="light"] .menu-body{background:var(--bg);}
[data-theme="light"] .menu-nav{background:rgba(245,242,237,.95);border-bottom-color:rgba(255,179,0,.15);}
[data-theme="light"] .cart-drawer{background:var(--bg2);border-left-color:rgba(255,179,0,.2);}
[data-theme="light"] .drawer-head{border-bottom-color:rgba(255,179,0,.12);}
[data-theme="light"] .drawer-footer{border-top-color:rgba(255,179,0,.12);}
/* ── THEME TOGGLE ── */
.theme-toggle{width:36px;height:36px;border-radius:50%;background:transparent;border:1.5px solid rgba(255,179,0,.35);color:var(--gold);cursor:pointer;font-size:.88rem;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;flex-shrink:0;}
.theme-toggle:hover{background:rgba(255,179,0,.12);border-color:var(--gold);}
  </style>
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>
<div class="mobile-overlay" id="mobileOverlay"></div>

<!-- NAVBAR -->
<nav id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg class="logo-mark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFB300"/>
            <stop offset="100%" stop-color="#FF4081"/>
          </linearGradient>
        </defs>
        <rect x="1" y="1" width="26" height="26" stroke="url(#navGrad)" stroke-width="0.8" opacity="0.9"/>
        <path d="M7,21 L7,7 L21,21 L21,7" fill="none" stroke="url(#navGrad)" stroke-width="2.2" stroke-linecap="square" stroke-linejoin="miter"/>
      </svg>
      <span class="logo-wordmark">NOIR</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html#process">Our Process</a></li>
      <li><a href="menu.html" class="active">Menu</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#gallery">Gallery</a></li>
      <li><a href="reserve.html">Reservations</a></li>
    </ul>
    <div class="nav-cta">
      <a href="order.html" class="btn-primary" style="padding:10px 22px;font-size:.85rem;"><i class="fa-solid fa-bag-shopping"></i> Order Now</a>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode"><i class="fa-solid fa-sun" id="themeIcon"></i></button>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <div style="position:absolute;top:20px;right:20px;">
    <button id="mobileClose" style="background:none;border:none;color:#888480;font-size:1.4rem;cursor:pointer;padding:8px;" aria-label="Close menu"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
  <a href="reserve.html">Reserve</a>
  <a href="order.html" class="btn-primary" style="margin-top:8px;"><i class="fa-solid fa-bag-shopping"></i> Order Now</a>
</div>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="prism-wrap" id="heroPrism"></div>
  <span class="section-label" style="position:relative;z-index:1;">Carefully Curated</span>
  <h1 style="position:relative;z-index:1;">Our <em style="background:linear-gradient(135deg,var(--gold),var(--hot));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:italic;">Menu</em></h1>
  <p style="position:relative;z-index:1;">From sunrise espresso to sunset small plates — every item crafted with intention.</p>
</div>

<!-- STICKY CATEGORY NAV -->
<div class="menu-nav">
  <div class="menu-nav-inner" id="catNav">
    <button class="cat-btn active" data-cat="espresso">Espresso</button>
    <button class="cat-btn" data-cat="filter">Filter Coffee</button>
    <button class="cat-btn" data-cat="cold">Cold Drinks</button>
    <button class="cat-btn" data-cat="breakfast">Breakfast</button>
    <button class="cat-btn" data-cat="lunch">Lunch</button>
    <button class="cat-btn" data-cat="dessert">Desserts</button>
  </div>
</div>

<!-- MENU BODY -->
<div class="menu-body">
  <div class="container" id="menuContainer">
    <!-- sections injected by JS -->
  </div>
</div>

<!-- FLOATING CART BUTTON -->
<button class="float-cart" id="cartBtn">
  <i class="fa-solid fa-bag-shopping"></i>
  <span class="cart-badge" id="cartCount">0</span>
</button>

<!-- CART OVERLAY + DRAWER -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-head">
    <h3>Your Bag</h3>
    <button class="drawer-close" id="drawerClose"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter" style="display:none;">
    <div class="subtotal-row"><span class="label">Subtotal</span><span class="val" id="subtotalVal">EGP 0</span></div>
    <div class="subtotal-row"><span class="label">Delivery</span><span class="val">EGP 25</span></div>
    <div class="total-row"><span class="label">Total</span><span class="val" id="totalVal">EGP 25</span></div>
    <button class="checkout-btn" onclick="window.location.href='order.html'">Proceed to Checkout <i class="fa-solid fa-arrow-right"></i></button>
  </div>
</div>

<script>
/* ── HAMBURGER ── */
function openMenu() {
  document.getElementById('mobileMenu').classList.add('open');
  document.getElementById('hamburger').classList.add('open');
  document.getElementById('mobileOverlay').classList.add('open');
}
function closeMenuMobile() {
  document.getElementById('mobileMenu').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('open');
}
document.getElementById('hamburger').addEventListener('click', openMenu);
document.getElementById('mobileOverlay').addEventListener('click', closeMenuMobile);

/* ── CART STATE ── */
let cart = JSON.parse(localStorage.getItem('noir_cart') || '[]');

function saveCart() { localStorage.setItem('noir_cart', JSON.stringify(cart)); }

function updateCartUI() {
  const count = cart.length;
  document.getElementById('cartCount').textContent = count;
  renderDrawer();
}

function addItem(name, price) {
  cart.push({ name, price });
  saveCart(); updateCartUI(); showToast(name + ' added to bag');
}

function removeItem(idx) { cart.splice(idx, 1); saveCart(); updateCartUI(); }

function renderDrawer() {
  const body = document.getElementById('drawerBody');
  const footer = document.getElementById('drawerFooter');
  if (cart.length === 0) {
    body.innerHTML = '<div class="cart-empty"><i class="fa-solid fa-bag-shopping"></i><p>Your bag is empty</p></div>';
    footer.style.display = 'none';
    return;
  }
  body.innerHTML = cart.map((item, i) => `
    <div class="cart-item">
      <div class="ci-emoji" style="font-family:'Playfair Display',serif;font-weight:900;color:rgba(168,144,112,.5);font-size:1rem;">N</div>
      <div><div class="ci-name">${item.name}</div><div class="ci-price">EGP ${item.price}</div></div>
      <button class="ci-remove" onclick="removeItem(${i})"><i class="fa-solid fa-xmark"></i></button>
    </div>
  `).join('');
  footer.style.display = 'block';
  const sub = cart.reduce((s,i) => s + i.price, 0);
  document.getElementById('subtotalVal').textContent = 'EGP ' + sub;
  document.getElementById('totalVal').textContent = 'EGP ' + (sub + 25);
}

/* ── RENDER MENU ── */
function renderMenu(activeCat) {
  const container = document.getElementById('menuContainer');
  const cats = activeCat === 'all' ? Object.keys(MENU) : [activeCat];
  container.innerHTML = cats.map(cat => {
    const section = MENU[cat];
    return `
      <div class="menu-section reveal" id="sec-${cat}">
        <div class="menu-section-head">
          <h2>${section.label}</h2>
          <div class="line"></div>
        </div>
        <div class="items-grid">
          ${section.items.map(item => `
            <div class="item-card">
              <div class="item-body">
                <div class="item-badges">
                  ${item.badges.map(b => `<span class="badge badge-cat">${b}</span>`).join('')}
                  ${item.badges.includes('popular') ? '<span class="badge badge-pop">Popular</span>' : ''}
                  ${item.badges.includes('new') ? '<span class="badge badge-new">New</span>' : ''}
                </div>
                <div class="item-name">${item.name}</div>
                <p class="item-desc">${item.desc}</p>
                <div class="item-footer">
                  <span class="item-price">EGP ${item.price}</span>
                  <button class="add-btn" onclick="addItem('${item.name.replace(/'/g,'&#39;')}',${item.price})">
                    <i class="fa-solid fa-plus"></i> Add
                  </button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
  // re-run reveal observer
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
}

const revealObserver = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObserver.unobserve(e.target); } });
}, { threshold: 0.08 });

/* ── TOAST ── */
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--gold);color:#fff;padding:12px 28px;border-radius:50px;font-weight:600;font-size:.9rem;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = 1;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = 0; }, 2200);
}

/* ── BUTTON RIPPLE ── */
document.addEventListener('click', e => {
  const btn = e.target.closest('.btn-primary,.btn-outline');
  if (!btn) return;
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(btn.offsetWidth, btn.offsetHeight);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
});

(function() {
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('noir_theme', t);
    var icon = document.getElementById('themeIcon');
    if (icon) icon.className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  applyTheme(localStorage.getItem('noir_theme') || 'dark');
  var btn = document.getElementById('themeToggle');
  if (btn) btn.addEventListener('click', function() {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
})();
